name: Download license from Yandex.Disk

on:
  push:
    paths:
      - '.github/workflows/download-license.yml'
      - 'scripts/download-license-from-yadisk.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run download script
        run: bash scripts/download-license-from-yadisk.sh
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/docs/
          if git diff --staged --quiet; then
            echo "Nothing new to commit."; exit 0
          fi
          git commit -m "chore(docs): pull license from Yandex.Disk"
          git push origin HEAD:${{ github.ref_name }}
