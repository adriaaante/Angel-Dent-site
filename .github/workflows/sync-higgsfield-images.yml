name: Sync Higgsfield images

# Runs the local sync script on GitHub-hosted runners (which have full
# internet access, unlike the dev sandbox). Downloads the generated CDN
# images into assets/img/generated/, optimises with pngquant, and rewrites
# all CDN URLs in HTML to local /assets/img/generated/ paths.
#
# Triggers:
#   • automatically when the workflow file or the sync script change
#   • manually from the Actions tab via the "Run workflow" button

on:
  push:
    paths:
      - '.github/workflows/sync-higgsfield-images.yml'
      - 'scripts/sync-higgsfield-images.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # full history so we can push back
          fetch-depth: 0

      - name: Install pngquant
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pngquant

      - name: Run sync script
        run: bash scripts/sync-higgsfield-images.sh

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit — images already in sync."
            exit 0
          fi
          git commit -m "chore(images): sync Higgsfield CDN assets to local /assets/img/generated/"
          git push origin HEAD:${{ github.ref_name }}
