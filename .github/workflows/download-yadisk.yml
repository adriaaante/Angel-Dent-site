name: Download license PDFs from Yandex.Disk

# Yandex.Disk is unreachable from the dev sandbox, but GitHub-hosted
# runners have full internet access. This workflow runs the local
# download script and commits the downloaded files into assets/docs/.

on:
  push:
    paths:
      - '.github/workflows/download-yadisk.yml'
      - 'scripts/download-license-from-yadisk.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run download script
        run: bash scripts/download-license-from-yadisk.sh

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit — files already in sync."
            exit 0
          fi
          git commit -m "chore(docs): pull license PDFs from Yandex.Disk"
          git push origin HEAD:${{ github.ref_name }}
